    <circle cx="0" cy="0" r="4.5" fill="#f472b6"/>
    <circle cx="0" cy="0" r="2.5" fill="#ec4899"/>
  </g>

  <!-- Flower 2 - medium -->
  <g transform="translate(115, 60)" opacity="0.85">
    <ellipse cx="0" cy="-8" rx="6" ry="9.5" fill="#fff0f3" transform="rotate(15)"/>
