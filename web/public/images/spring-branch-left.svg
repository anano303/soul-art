<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Main branch -->
  <path d="M-10 -5 Q 60 40, 120 70 Q 180 100, 250 105 Q 300 108, 360 95" 
        stroke="#8B6347" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Secondary branch -->
  <path d="M80 50 Q 110 90, 130 130" 
        stroke="#8B6347" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Small twig -->
