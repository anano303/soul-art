    <ellipse cx="0" cy="-6.5" rx="5" ry="7.5" fill="#fce7f3" transform="rotate(251)"/>
    <ellipse cx="0" cy="-6.5" rx="5" ry="7.5" fill="#fce7f3" transform="rotate(323)"/>
