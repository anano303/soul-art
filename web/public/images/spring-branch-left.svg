  <!-- Small buds (unopened) -->
  <circle cx="145" cy="80" r="3.5" fill="#fbcfe8" opacity="0.6"/>
  <circle cx="220" cy="92" r="3" fill="#fce7f3" opacity="0.55"/>
  <circle cx="295" cy="100" r="2.5" fill="#fbcfe8" opacity="0.5"/>
  <circle cx="105" cy="108" r="2.5" fill="#fce7f3" opacity="0.5"/>
  <circle cx="350" cy="75" r="3" fill="#fbcfe8" opacity="0.45"/>
